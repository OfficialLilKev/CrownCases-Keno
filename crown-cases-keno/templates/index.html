<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrownCases Keno</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-body: #07080d;
            --bg-card: #0e1018;
            --bg-input: #080a10;
            --bg-mid: #090b12;
            --border-color: #1e2130;
            --border-gold: #8a6a1a;
            --primary: #c9922a;
            --primary-bright: #f0b840;
            --primary-hover: #b07d20;
            --primary-glow: rgba(201, 146, 42, 0.35);
            --text-white: #f0e8d5;
            --text-gray: #6a7090;
            --success: #00e87a;
            --error: #ff4455;
            --gold-light: #f5d080;
            --gold-dark: #7a5010;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-body);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(201,146,42,0.08) 0%, transparent 60%),
                repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.012) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.012) 40px);
            color: var(--text-white);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .window-wrapper {
            display: flex;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 0 0 1px var(--border-gold), 0 30px 80px rgba(0,0,0,0.8), 0 0 60px rgba(201,146,42,0.07);
            background-color: var(--bg-card);
            height: 560px;
        }

        /* LEFT PANEL */
        .controls-panel {
            width: 240px;
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            padding: 22px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
        }

        .controls-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--primary-bright), var(--primary), transparent);
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-gray);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 7px;
            font-family: 'Barlow Condensed', sans-serif;
        }

        .input-box {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 7px;
            display: flex;
            align-items: center;
            padding: 2px 8px;
            transition: 0.2s;
        }
        .input-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-glow);
        }
        .input-box img { width: 16px; margin-right: 8px; opacity: 0.85; }
        .input-box input {
            background: transparent; border: none; color: var(--text-white);
            flex-grow: 1; padding: 10px 0; font-size: 15px; outline: none;
            font-family: 'Barlow Condensed', sans-serif; font-weight: 600; letter-spacing: 0.5px;
        }
        .bet-btns { display: flex; gap: 4px; }
        .bet-btn {
            background: #1a1d28;
            border: 1px solid var(--border-color);
            color: var(--text-gray);
            width: 30px; height: 28px; border-radius: 5px;
            font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.15s;
            font-family: 'Barlow Condensed', sans-serif;
        }
        .bet-btn:hover { background: #242838; color: var(--gold-light); border-color: var(--border-gold); }

        .mode-badge {
            background: linear-gradient(135deg, #1a1d28 0%, #111420 100%);
            border: 1px solid var(--border-gold);
            border-radius: 7px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .crown-icon-sm { font-size: 16px; }
        .mode-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 14px; font-weight: 800;
            background: linear-gradient(90deg, var(--primary-bright), var(--gold-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .sec-btn {
            background: #13151f;
            color: var(--text-gray);
            border: 1px solid var(--border-color);
            padding: 11px;
            border-radius: 7px;
            font-size: 12px; font-weight: 700;
            cursor: pointer; transition: 0.15s;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .sec-btn:hover { background: #1a1d28; color: var(--gold-light); border-color: var(--border-gold); }

        .big-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-bright) 50%, var(--primary) 100%);
            background-size: 200% 100%;
            color: #07080d;
            border: none;
            width: 100%; padding: 15px;
            border-radius: 8px;
            font-size: 16px; font-weight: 800;
            cursor: pointer; transition: 0.25s;
            text-transform: uppercase;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 2px;
            box-shadow: 0 4px 20px rgba(201,146,42,0.3);
        }
        .big-btn:hover:not(:disabled) {
            background-position: 100% 0;
            box-shadow: 0 6px 30px rgba(201,146,42,0.5);
            transform: translateY(-1px);
        }
        .big-btn:disabled {
            background: #1a1d28; color: #3a3d50; cursor: not-allowed;
            transform: none; box-shadow: none;
        }

        .logo-space {
            margin-top: auto;
            padding-top: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .logo-space img { width: 150px; filter: drop-shadow(0 4px 12px rgba(201,146,42,0.3)); }

        /* MIDDLE GAME PANEL */
        .game-panel {
            width: 500px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-mid);
            position: relative;
        }

        .game-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(201,146,42,0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 7px;
            width: 100%;
        }

        .tile {
            aspect-ratio: 1;
            background: #13151f;
            border: 1px solid #1c1f2e;
            border-radius: 7px;
            color: #4a5070;
            font-size: 14px; font-weight: 700;
            cursor: pointer;
            position: relative;
            transition: 0.1s;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 0.3px;
        }
        .tile:hover { background: #1a1d2e; color: #8890b5; border-color: #2a2d40; }

        .tile.selected {
            background: linear-gradient(135deg, #1a1400, #2a2000);
            border: 1px solid var(--border-gold);
            color: var(--gold-light);
            box-shadow: 0 0 10px rgba(201,146,42,0.25), inset 0 0 8px rgba(201,146,42,0.07);
        }

        .tile.drawn {
            background: #160e0e;
            color: var(--error);
            border: 1px solid rgba(255, 68, 85, 0.18);
            font-weight: bold;
        }

        .tile.hit {
            background: #0a1a12;
            color: transparent !important;
            border: 1px solid var(--success);
            box-shadow: 0 0 18px rgba(0, 232, 122, 0.25);
        }

        .gem-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 68%; height: 68%;
            display: none;
            filter: drop-shadow(0 0 6px rgba(0, 232, 122, 0.9));
        }
        .tile.hit .gem-icon { display: block; animation: popGem 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .tile.hit span { opacity: 0; }

        @keyframes popGem {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-20deg); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

        #msg-area {
            height: 22px;
            margin-top: 14px;
            font-size: 15px;
            font-weight: 800;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #3a3d55;
        }

        .payout-container {
            width: 100%;
            margin-top: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 7px;
            display: flex;
            overflow: hidden;
            padding: 4px;
            gap: 3px;
        }
        .payout-step {
            flex: 1; text-align: center;
            font-size: 10px; font-weight: 700;
            color: #2a2d40;
            padding: 7px 0;
            border-radius: 4px;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 0.5px;
            transition: 0.2s;
        }
        .payout-step.active {
            background: linear-gradient(135deg, #1a1400, #2a2000);
            color: var(--gold-light);
            border: 1px solid var(--border-gold);
            box-shadow: 0 0 10px rgba(201,146,42,0.2);
        }

        /* RIGHT STATS PANEL */
        .stats-panel {
            width: 185px;
            background: var(--bg-card);
            border-left: 1px solid var(--border-color);
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            position: relative;
        }
        .stats-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--primary-bright), var(--primary), transparent);
        }

        .stats-header {
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; font-weight: 700;
            color: var(--gold-light);
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border-color);
        }

        .stat-item { display: flex; flex-direction: column; gap: 4px; }
        .stat-label {
            font-size: 10px; color: var(--text-gray);
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 1px; text-transform: uppercase;
        }
        .stat-value {
            font-size: 18px; font-weight: 800; color: white;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 0.5px;
        }
        .val-green { color: var(--success); }
        .val-red { color: var(--error); }
        .val-gold { color: var(--primary-bright); }

        /* DIVIDER LINES in stats */
        .stat-divider {
            border: none;
            border-top: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

<div class="window-wrapper">

    <!-- LEFT: CONTROLS -->
    <div class="controls-panel">

        <div class="control-group">
            <label>
                <span>Bet Amount</span>
                <span id="wallet-val" style="color: var(--gold-light); font-weight: 700;">$0.00</span>
            </label>
            <div class="input-box">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Bitcoin.svg/800px-Bitcoin.svg.png" alt="coin">
                <input type="number" id="bet-input" value="10.00">
                <div class="bet-btns">
                    <button class="bet-btn" onclick="adjBet(0.5)">½</button>
                    <button class="bet-btn" onclick="adjBet(2)">2×</button>
                </div>
            </div>
        </div>

        <div class="control-group">
            <label>Mode</label>
            <div class="mode-badge">
                <span class="crown-icon-sm">👑</span>
                <span class="mode-text">Classic</span>
            </div>
        </div>

        <div class="action-row">
            <button class="sec-btn" onclick="autoPick()">Auto Pick</button>
            <button class="sec-btn" onclick="clearTable()">Clear</button>
        </div>

        <button id="main-btn" class="big-btn" onclick="playGame()" disabled>Pick Numbers</button>

        <div class="logo-space">
            <img src="https://image2url.com/r2/default/images/1774907358927-33128cbe-1a1a-45d9-baa6-c7d961eb664a.png" alt="CrownCases">
        </div>
    </div>

    <!-- MIDDLE: GRID -->
    <div class="game-panel">
        <div class="grid-container" id="grid"></div>

        <div id="msg-area">Select 1–10 numbers</div>

        <div class="payout-container" id="payout-bar"></div>
    </div>

    <!-- RIGHT: STATS -->
    <div class="stats-panel">
        <div class="stats-header">
            <i data-lucide="bar-chart-2" size="14"></i> Live Stats
        </div>

        <div class="stat-item">
            <span class="stat-label">Profit</span>
            <span class="stat-value val-green" id="st-profit">$0.00</span>
        </div>
        <hr class="stat-divider">
        <div class="stat-item">
            <span class="stat-label">Wins</span>
            <span class="stat-value val-green" id="st-wins">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Losses</span>
            <span class="stat-value val-red" id="st-losses">0</span>
        </div>
        <hr class="stat-divider">
        <div class="stat-item">
            <span class="stat-label">Wagered</span>
            <span class="stat-value val-gold" id="st-wagered">$0.00</span>
        </div>
    </div>

</div>

<!-- Hidden gem SVG symbol -->
<svg style="display:none;">
    <symbol id="gem-icon" viewBox="0 0 24 24">
        <path fill="#00e87a" d="M12,2 L2,8 L4,20 L12,22 L20,20 L22,8 L12,2 Z" stroke="rgba(0,255,130,0.6)" stroke-width="1"/>
        <path fill="rgba(255,255,255,0.25)" d="M12,2 L7,8 L12,18 L17,8 L12,2 Z"/>
        <path fill="rgba(255,255,255,0.15)" d="M2,8 L7,8 L12,18 L4,20 Z"/>
    </symbol>
</svg>

<script>
    lucide.createIcons();

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function snd(t) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (t == 'click') {
            o.type = 'sine'; o.frequency.setValueAtTime(700, now);
            g.gain.setValueAtTime(0.04, now); g.gain.linearRampToValueAtTime(0, now + 0.05);
            o.start(now); o.stop(now + 0.05);
        } else if (t == 'tick') {
            o.type = 'square';
            o.frequency.setValueAtTime(180, now);
            g.gain.setValueAtTime(0.04, now);
            g.gain.exponentialRampToValueAtTime(0.01, now + 0.06);
            o.start(now); o.stop(now + 0.06);
        } else if (t == 'ding') {
            o.type = 'sine';
            o.frequency.setValueAtTime(1600, now);
            o.frequency.linearRampToValueAtTime(1200, now + 0.15);
            g.gain.setValueAtTime(0.18, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            o.start(now); o.stop(now + 0.5);
        } else if (t == 'win') {
            o.type = 'triangle'; o.frequency.setValueAtTime(440, now);
            o.frequency.linearRampToValueAtTime(880, now + 0.25);
            g.gain.setValueAtTime(0.22, now); g.gain.linearRampToValueAtTime(0, now + 0.6);
            o.start(now); o.stop(now + 0.6);
        }
    }

    const GRID_SIZE = 40;
    const PAYOUTS = {
        1: { 1: 3.96 },
        2: { 2: 15.00 },
        3: { 2: 1.5, 3: 36.00 },
        4: { 2: 1.2, 3: 5.0, 4: 80.00 },
        5: { 2: 0.5, 3: 3.0, 4: 12.0, 5: 300.00 },
        6: { 3: 1.0, 4: 5.0, 5: 30.0, 6: 500.00 },
        7: { 3: 0.5, 4: 3.0, 5: 15.0, 6: 100.0, 7: 700.00 },
        8: { 4: 1.5, 5: 10.0, 6: 50.0, 7: 300.0, 8: 800.00 },
        9: { 4: 1.0, 5: 5.0, 6: 30.0, 7: 100.0, 8: 500.0, 9: 900.00 },
        10: { 5: 2.0, 6: 15.0, 7: 80.0, 8: 400.0, 9: 800.0, 10: 1000.00 }
    };

    let selected = [];
    let isPlaying = false;

    // Build grid
    const gridEl = document.getElementById('grid');
    for (let i = 1; i <= GRID_SIZE; i++) {
        const b = document.createElement('button');
        b.className = 'tile';
        b.id = `t-${i}`;
        b.innerHTML = `<span>${i}</span><svg class="gem-icon"><use href="#gem-icon"/></svg>`;
        b.onclick = () => toggle(i);
        gridEl.appendChild(b);
    }

    fetchStats();

    function toggle(n) {
        if (isPlaying) return;
        snd('click');
        const idx = selected.indexOf(n);
        if (idx > -1) selected.splice(idx, 1);
        else if (selected.length < 10) selected.push(n);
        updateUI();
    }

    function autoPick() {
        if (isPlaying) return;
        snd('click');
        selected = [];
        while (selected.length < 10) {
            const r = Math.floor(Math.random() * 40) + 1;
            if (!selected.includes(r)) selected.push(r);
        }
        updateUI();
    }

    function clearTable() {
        if (isPlaying) return;
        selected = [];
        updateUI();
        const msg = document.getElementById('msg-area');
        msg.innerText = "Select 1–10 numbers";
        msg.style.color = "#3a3d55";
    }

    function adjBet(m) {
        const i = document.getElementById('bet-input');
        i.value = (parseFloat(i.value) * m).toFixed(2);
    }

    function updateUI() {
        document.querySelectorAll('.tile').forEach(t => {
            t.classList.remove('hit', 'drawn', 'selected');
            const n = parseInt(t.querySelector('span').innerText);
            if (selected.includes(n)) t.classList.add('selected');
        });

        const btn = document.getElementById('main-btn');
        if (selected.length === 0) {
            btn.disabled = true; btn.innerText = "Pick Numbers";
        } else {
            btn.disabled = false;
            btn.innerText = `Bet  (${selected.length} picks)`;
        }

        const bar = document.getElementById('payout-bar');
        bar.innerHTML = "";
        const ct = selected.length;
        if (ct > 0) {
            const tbl = PAYOUTS[ct] || {};
            for (let i = 0; i <= ct; i++) {
                const m = tbl[i] || 0;
                const d = document.createElement('div');
                d.className = 'payout-step';
                d.innerHTML = `<span style="display:block;font-size:8px;opacity:0.5;margin-bottom:1px;">${i}×</span>${m > 0 ? m + 'x' : '—'}`;
                d.id = `pay-${i}`;
                if (m == 0) d.style.opacity = 0.25;
                bar.appendChild(d);
            }
        }
    }

    async function playGame() {
        if (selected.length == 0) return;
        isPlaying = true;
        const btn = document.getElementById('main-btn');
        btn.disabled = true; btn.innerText = "Drawing...";
        document.getElementById('msg-area').innerText = "";

        document.querySelectorAll('.tile').forEach(t => {
            t.classList.remove('hit', 'drawn');
            const n = parseInt(t.querySelector('span').innerText);
            if (selected.includes(n)) t.classList.add('selected');
        });
        document.querySelectorAll('.payout-step').forEach(s => s.classList.remove('active'));

        const betVal = parseFloat(document.getElementById('bet-input').value);

        try {
            const res = await fetch('/api/play', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bet: betVal, picked: selected })
            });
            const data = await res.json();

            if (data.error) { alert(data.error); isPlaying = false; updateUI(); return; }

            for (let n of data.drawn) {
                await new Promise(r => setTimeout(r, 140));
                const el = document.getElementById(`t-${n}`);
                if (selected.includes(n)) {
                    el.classList.add('hit');
                    snd('ding');
                } else {
                    el.classList.add('drawn');
                    snd('tick');
                }
            }

            const msg = document.getElementById('msg-area');
            if (data.payout > 0) {
                snd('win');
                msg.innerText = `👑 YOU WON $${data.payout.toFixed(2)}`;
                msg.style.color = "var(--primary-bright)";
            } else {
                msg.innerText = "Better luck next time";
                msg.style.color = "#3a3d55";
            }

            const payEl = document.getElementById(`pay-${data.hits}`);
            if (payEl) payEl.classList.add('active');

            document.getElementById('wallet-val').innerText = `$${data.new_balance.toFixed(2)}`;
            fetchStats();

        } catch (e) { console.error(e); }

        isPlaying = false;
        btn.disabled = false;
        btn.innerText = `Bet  (${selected.length} picks)`;
    }

    async function fetchStats() {
        try {
            const r = await fetch('/api/stats');
            const d = await r.json();
            const profitEl = document.getElementById('st-profit');
            profitEl.innerText = `$${d.profit.toFixed(2)}`;
            profitEl.className = d.profit >= 0 ? 'stat-value val-green' : 'stat-value val-red';
            document.getElementById('st-wagered').innerText = `$${d.wagered.toFixed(2)}`;
            document.getElementById('st-wins').innerText = d.wins;
            document.getElementById('st-losses').innerText = d.losses;
        } catch (e) { }
    }
</script>

</body>
</html>
